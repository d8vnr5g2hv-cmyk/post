function Avatar({ image, name, color, size = 64 }) {
  const src = image ? IMAGE_DIR + image : "";
  const [err, setErr] = useState(false);
  if (src && !err) {
    return (
      <img src={src} alt={name} onError={() => setErr(true)}
        style={{ width: size, height: size, borderRadius: 12, objectFit: "cover",
          border: `1px solid ${C.line}` }} />
    );
  }
  return (
    <div style={{ width: size, height: size, borderRadius: 12,
      background: `linear-gradient(135deg, ${color}22, ${C.card})`,
      border: `1px dashed ${color}66`, display: "flex", alignItems: "center",
      justifyContent: "center", color: color, fontSize: size * 0.4, fontWeight: 700 }}>
      {name.slice(0, 1)}
    </div>
  );
}

        <div style={{ display: "flex", alignItems: "baseline", gap: 12 }}>
          <h1 style={{ margin: 0, fontSize: 34, fontWeight: 900, letterSpacing: 8,
            background: `linear-gradient(180deg, ${C.white}, ${C.blue})`,
            WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
            PAST
          </h1>
          <span style={{ color: C.sub, fontSize: 12, letterSpacing: 2 }}>
            冥王ヨウヘイ 世界観データベース
          </span>
        </div>
        {/* タブ */}
        <nav style={{ display: "flex", gap: 6, marginTop: 14, overflowX: "auto", paddingBottom: 2 }}>
          {tabs.map(([k, label]) => (
            <button key={k} onClick={() => { setTab(k); setSelected(null); }}
              style={{ flexShrink: 0, padding: "8px 14px", borderRadius: 20, fontSize: 13,
                cursor: "pointer", whiteSpace: "nowrap",
                border: `1px solid ${tab === k ? C.blue : C.line}`,
                background: tab === k ? `${C.blue}22` : "transparent",
                color: tab === k ? C.white : C.sub, fontWeight: tab === k ? 700 : 400 }}>
              {label}
            </button>
          ))}
        </nav>
      </header>

      <main style={{ padding: 20, maxWidth: 760, margin: "0 auto" }}>
        {tab === "home" && <Home byId={byId} setTab={setTab} />}
        {tab === "chars" && (
          <Chars filtered={filtered} factionFilter={factionFilter}
            setFactionFilter={setFactionFilter} onSelect={setSelected} />
        )}
        {tab === "power" && (
          <Power ranked={ranked} rankAxis={rankAxis} setRankAxis={setRankAxis}
            chars={chars} cmpA={cmpA} cmpB={cmpB} setCmpA={setCmpA} setCmpB={setCmpB} byId={byId} />
        )}
        {tab === "worlds" && <Worlds />}
        {tab === "magic" && <Magic />}
        {tab === "story" && <Story />}
      </main>

      {selected && <CharModal c={byId[selected]} onClose={() => setSelected(null)} />}

      <footer style={{ textAlign: "center", color: C.sub, fontSize: 11,
        padding: "30px 0 40px", letterSpacing: 1 }}>
        PAST ― 設定が増えたら DATA に追記
      </footer>
    </div>
  );
}

/* ---- ホーム ---- */
function Home({ byId, setTab }) {
  const y = byId["youhei"];
  return (
    <div>
      <div style={{ background: `linear-gradient(160deg, ${C.bg2}, ${C.card})`,
        border: `1px solid ${C.line}`, borderRadius: 18, padding: 24,
        position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", top: -40, right: -40, width: 180, height: 180,
          background: `radial-gradient(circle, ${C.blue}22, transparent 70%)` }} />
        <div style={{ display: "flex", gap: 18, alignItems: "center" }}>
          <Avatar image={y.image} name={y.name} color={C.thunder} size={92} />
          <div>
            <div style={{ color: C.thunder, fontSize: 12, letterSpacing: 3 }}>原初・白雷</div>
            <div style={{ fontSize: 26, fontWeight: 900, margin: "2px 0" }}>{y.name}</div>
            <div style={{ color: C.sub, fontSize: 13 }}>{y.role}</div>
          </div>
        </div>
        <p style={{ color: C.text, fontSize: 14, lineHeight: 1.9, marginTop: 16 }}>{y.desc}</p>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginTop: 16 }}>
        <Stat label="現在" value="第3章" sub="キヴォトス滞在中" onClick={() => setTab("story")} />
        <Stat label="タイマン" value="世界最強" sub="1対1なら別格" onClick={() => setTab("power")} />
      </div>

      <SectionTitle>このデータベースについて</SectionTitle>
      <p style={{ color: C.sub, fontSize: 13, lineHeight: 1.9 }}>
        第一次世界戦争終結から3年後を起点とする物語。各タブからキャラ・強さ・世界圏・魔法体系・物語を閲覧できる。
        妄想が増えたらコード内の DATA に追記すれば、すべての画面に自動で反映される。
      </p>
    </div>
  );
}

function Stat({ label, value, sub, onClick }) {
  return (
    <div onClick={onClick} style={{ background: C.card, border: `1px solid ${C.line}`,
      borderRadius: 14, padding: 16, cursor: "pointer" }}>
      <div style={{ color: C.sub, fontSize: 11, letterSpacing: 2 }}>{label}</div>
      <div style={{ fontSize: 20, fontWeight: 800, color: C.white, margin: "4px 0" }}>{value}</div>
      <div style={{ color: C.blue, fontSize: 12 }}>{sub}</div>
    </div>
  );
}

/* ---- キャラ図鑑 ---- */
function Chars({ filtered, factionFilter, setFactionFilter, onSelect }) {
  const chips = [["all", "すべて"], ...Object.entries(FACTIONS).map(([k, v]) => [k, v.label])];
  return (
    <div>
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 16 }}>
        {chips.map(([k, label]) => (
          <button key={k} onClick={() => setFactionFilter(k)}
            style={{ padding: "6px 12px", borderRadius: 16, fontSize: 12, cursor: "pointer",
              border: `1px solid ${factionFilter === k ? C.blue : C.line}`,
              background: factionFilter === k ? `${C.blue}22` : "transparent",
              color: factionFilter === k ? C.white : C.sub }}>
            {label}
          </button>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        {filtered.map((c) => {
          const f = FACTIONS[c.faction];
          return (
            <div key={c.id} onClick={() => onSelect(c.id)}
              style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 14,
                padding: 14, cursor: "pointer", display: "flex", gap: 12, alignItems: "center" }}>
              <Avatar image={c.image} name={c.name} color={f.color} size={52} />
              <div style={{ minWidth: 0 }}>
                <div style={{ fontWeight: 700, fontSize: 14, whiteSpace: "nowrap",
                  overflow: "hidden", textOverflow: "ellipsis" }}>{c.name}</div>
                <div style={{ color: f.color, fontSize: 11 }}>{f.label}</div>
                <div style={{ color: C.sub, fontSize: 11, marginTop: 2 }}>
                  {ELEMENTS[c.element]}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ---- キャラ詳細モーダル ---- */
function CharModal({ c, onClose }) {
  if (!c) return null;
  const f = FACTIONS[c.faction];
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "#000A",
      display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 50 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: C.bg2,
        borderTop: `2px solid ${f.color}`, borderRadius: "20px 20px 0 0", padding: 24,
        width: "100%", maxWidth: 760, maxHeight: "85vh", overflowY: "auto" }}>
        <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
          <Avatar image={c.image} name={c.name} color={f.color} size={80} />
          <div>
            <div style={{ color: f.color, fontSize: 12 }}>{f.label}・{ELEMENTS[c.element]}</div>
            <div style={{ fontSize: 22, fontWeight: 900 }}>{c.name}</div>
            <div style={{ color: C.sub, fontSize: 13 }}>{c.role}</div>
          </div>
        </div>

        {(c.melee != null) && (
          <div style={{ display: "flex", gap: 12, marginTop: 16 }}>
            <Gauge label="タイマン" v={c.melee} color={C.thunder} />
            <Gauge label="戦争" v={c.war} color={C.gold} />
          </div>
        )}

        {c.tags && (
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 16 }}>
            {c.tags.map((t) => (
              <span key={t} style={{ fontSize: 11, color: f.color,
                border: `1px solid ${f.color}66`, borderRadius: 12, padding: "3px 10px" }}>{t}</span>
            ))}
          </div>
        )}

        <p style={{ color: C.text, fontSize: 14, lineHeight: 1.9, marginTop: 16 }}>{c.desc}</p>

        {c.skills && c.skills.length > 0 && (
          <div style={{ marginTop: 12 }}>
            <div style={{ color: C.sub, fontSize: 12, letterSpacing: 2, marginBottom: 8 }}>技</div>
            {c.skills.map((s) => (
              <div key={s} style={{ fontSize: 13, color: C.text, padding: "6px 0",
                borderBottom: `1px solid ${C.line}` }}>{s}</div>
            ))}
          </div>
        )}

        <button onClick={onClose} style={{ marginTop: 20, width: "100%", padding: 12,
          borderRadius: 12, border: `1px solid ${C.line}`, background: C.card,
          color: C.text, fontSize: 14, cursor: "pointer" }}>閉じる</button>
      </div>
    </div>
  );
}

function Gauge({ label, v, color }) {
  return (
    <div style={{ flex: 1 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
        <span style={{ color: C.sub }}>{label}</span>
        <span style={{ color, fontWeight: 700 }}>{v}</span>
      </div>
      <div style={{ height: 6, background: C.line, borderRadius: 3, overflow: "hidden" }}>
        <div style={{ width: `${v}%`, height: "100%", background: color,
          boxShadow: `0 0 8px ${color}` }} />
      </div>
    </div>
  );
}

/* ---- 強さ序列 ---- */
function Power({ ranked, rankAxis, setRankAxis, chars, cmpA, cmpB, setCmpA, setCmpB, byId }) {
  const a = byId[cmpA], b = byId[cmpB];
  const max = Math.max(...ranked.map((c) => c[rankAxis]), 1);
  return (
    <div>
      <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
        {[["melee", "タイマン軸"], ["war", "戦争軸"]].map(([k, label]) => (
          <button key={k} onClick={() => setRankAxis(k)}
            style={{ flex: 1, padding: "10px", borderRadius: 12, fontSize: 13, cursor: "pointer",
              border: `1px solid ${rankAxis === k ? C.blue : C.line}`,
              background: rankAxis === k ? `${C.blue}22` : "transparent",
              color: rankAxis === k ? C.white : C.sub, fontWeight: rankAxis === k ? 700 : 400 }}>
            {label}
          </button>
        ))}
      </div>

      {ranked.map((c, i) => {
        const f = FACTIONS[c.faction];
        return (
          <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0" }}>
            <span style={{ width: 22, color: i < 3 ? C.gold : C.sub, fontWeight: 800,
              fontSize: i < 3 ? 16 : 13 }}>{i + 1}</span>
            <span style={{ width: 110, fontSize: 13, whiteSpace: "nowrap", overflow: "hidden",
              textOverflow: "ellipsis" }}>{c.name}</span>
            <div style={{ flex: 1, height: 8, background: C.line, borderRadius: 4, overflow: "hidden" }}>
              <div style={{ width: `${(c[rankAxis] / max) * 100}%`, height: "100%",
                background: `linear-gradient(90deg, ${f.color}, ${C.white})` }} />
            </div>
            <span style={{ width: 30, textAlign: "right", fontSize: 13, color: C.thunder,
              fontWeight: 700 }}>{c[rankAxis]}</span>
          </div>
        );
      })}

      <SectionTitle>1対1 比較</SectionTitle>
      <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
        <Picker chars={chars} value={cmpA} onChange={setCmpA} />
        <span style={{ alignSelf: "center", color: C.sub, fontSize: 13 }}>vs</span>
        <Picker chars={chars} value={cmpB} onChange={setCmpB} />
      </div>
      <div style={{ display: "flex", gap: 12 }}>
        <CmpCard c={a} other={b} />
        <CmpCard c={b} other={a} />
      </div>
    </div>
  );
}

function Picker({ chars, value, onChange }) {
  return (
    <select value={value} onChange={(e) => onChange(e.target.value)}
      style={{ flex: 1, padding: 10, borderRadius: 10, background: C.card,
        color: C.text, border: `1px solid ${C.line}`, fontSize: 13 }}>
      {chars.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
    </select>
  );
}

function CmpCard({ c, other }) {
  const f = FACTIONS[c.faction];
  const winMelee = c.melee >= other.melee;
  const winWar = c.war >= other.war;
  return (
    <div style={{ flex: 1, background: C.card, border: `1px solid ${C.line}`,
      borderRadius: 14, padding: 14 }}>
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
        <Avatar image={c.image} name={c.name} color={f.color} size={56} />
        <div style={{ fontWeight: 700, fontSize: 14, textAlign: "center" }}>{c.name}</div>
      </div>
      <div style={{ marginTop: 12 }}>
        <CmpRow label="タイマン" v={c.melee} win={winMelee} />
        <CmpRow label="戦争" v={c.war} win={winWar} />
      </div>
    </div>
  );
}

function CmpRow({ label, v, win }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13,
      padding: "6px 0", borderBottom: `1px solid ${C.line}` }}>
      <span style={{ color: C.sub }}>{label}</span>
      <span style={{ color: win ? C.thunder : C.sub, fontWeight: win ? 800 : 400 }}>
        {v}{win && " ▲"}
      </span>
    </div>
  );
}

/* ---- 世界圏 ---- */
function Worlds() {
  return (
    <div>
      {DATA.worlds.map((w) => {
        const f = FACTIONS[w.id] || { color: C.blue };
        return (
          <div key={w.id} style={{ background: C.card, border: `1px solid ${C.line}`,
            borderLeft: `3px solid ${f.color}`, borderRadius: 12, padding: 16, marginBottom: 10 }}>
            <div style={{ fontWeight: 800, fontSize: 16, color: f.color }}>{w.name}</div>
            <p style={{ color: C.text, fontSize: 13, lineHeight: 1.8, margin: "6px 0 0" }}>{w.note}</p>
          </div>
        );
      })}
    </div>
  );
}

/* ---- 魔法体系 ---- */
function Magic() {
  const m = DATA.magic;
  return (
    <div>
      <p style={{ color: C.sub, fontSize: 13, lineHeight: 1.9 }}>{m.intro}</p>

      <SectionTitle>属性の到達段階</SectionTitle>
      {m.stages.map((s) => (
        <div key={s.stage} style={{ background: C.card, border: `1px solid ${C.line}`,
          borderRadius: 12, padding: 14, marginBottom: 8 }}>
          <div style={{ fontWeight: 700, fontSize: 14, color: C.thunder }}>{s.stage}</div>
          <div style={{ display: "flex", gap: 16, margin: "6px 0", fontSize: 13 }}>
            <span>雷：<b style={{ color: C.white }}>{s.thunder}</b></span>
            <span>炎：<b style={{ color: C.white }}>{s.flame}</b></span>
          </div>
          <div style={{ color: C.sub, fontSize: 12 }}>{s.note}</div>
        </div>
      ))}

      <SectionTitle>原初の魔法（6枠）</SectionTitle>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        {m.primordials.map((p, i) => (
          <div key={i} style={{ background: p.known ? `${C.blue}15` : C.card,
            border: `1px solid ${p.known ? C.blue + "66" : C.line}`, borderRadius: 12, padding: 14 }}>
            <div style={{ fontSize: 18, fontWeight: 900,
              color: p.known ? C.white : C.sub }}>{p.name}</div>
            <div style={{ fontSize: 12, color: C.sub, marginTop: 4 }}>属性：{p.element}</div>
            <div style={{ fontSize: 12, color: p.known ? C.thunder : C.sub }}>{p.user}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---- 物語 ---- */
function Story() {
  return (
    <div>
      {DATA.chapters.map((ch) => (
        <div key={ch.no} style={{ position: "relative", paddingLeft: 24, marginBottom: 24 }}>
          <div style={{ position: "absolute", left: 0, top: 4, width: 12, height: 12,
            borderRadius: "50%", background: ch.current ? C.blue : C.line,
            boxShadow: ch.current ? `0 0 10px ${C.blue}` : "none" }} />
          <div style={{ position: "absolute", left: 5, top: 16, bottom: -20, width: 2,
            background: C.line }} />
          <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
            <span style={{ color: ch.current ? C.blue : C.sub, fontWeight: 800, fontSize: 14 }}>{ch.no}</span>
            <span style={{ fontWeight: 700, fontSize: 16 }}>{ch.title}</span>
            {ch.current && <span style={{ fontSize: 10, color: C.bg, background: C.blue,
              borderRadius: 8, padding: "2px 8px", fontWeight: 700 }}>現在</span>}
          </div>
          <ul style={{ margin: "8px 0 0", paddingLeft: 18 }}>
            {ch.body.map((b, i) => (
              <li key={i} style={{ color: C.text, fontSize: 13, lineHeight: 1.9 }}>{b}</li>
            ))}
          </ul>
        </div>
      ))}

      <SectionTitle>今後の火種</SectionTitle>
      {DATA.foreshadow.map((f, i) => (
        <div key={i} style={{ background: C.card, border: `1px solid ${C.line}`,
          borderRadius: 10, padding: "12px 14px", marginBottom: 8, fontSize: 13,
          color: C.text, lineHeight: 1.7 }}>{f}</div>
      ))}
    </div>
  );
}

function SectionTitle({ children }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, margin: "28px 0 14px" }}>
      <div style={{ width: 3, height: 16, background: C.blue }} />
      <h2 style={{ margin: 0, fontSize: 15, fontWeight: 800, letterSpacing: 1 }}>{children}</h2>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<PAST />);
</script>
</body>
</html>
